<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI CHEVER - Kreator AI Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0d15;
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app {
            max-width: 1200px;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo span {
            font-weight: 300;
            -webkit-text-fill-color: #94a3b8;
        }

        .credit-box {
            background: rgba(167, 139, 250, 0.12);
            padding: 10px 22px;
            border-radius: 40px;
            border: 1px solid rgba(167, 139, 250, 0.2);
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .credit-box i {
            color: #a78bfa;
        }
        .credit-box span {
            color: #fcd34d;
        }

        .api-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 18px 24px;
            margin: 24px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .api-section input {
            flex: 1;
            min-width: 200px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 18px;
            border-radius: 14px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .api-section input:focus {
            border-color: #a78bfa;
            background: rgba(167, 139, 250, 0.08);
        }
        .api-section input::placeholder {
            color: #64748b;
        }

        .btn-save {
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            border: none;
            padding: 12px 28px;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-save:hover {
            transform: scale(1.04);
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.3);
        }
        .status-save {
            font-size: 13px;
            color: #34d399;
            display: none;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin: 30px 0 24px;
            background: rgba(255, 255, 255, 0.04);
            padding: 6px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .tab-btn {
            flex: 1;
            padding: 14px 10px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-weight: 600;
            font-size: 15px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.2), rgba(96, 165, 250, 0.15));
            color: white;
            box-shadow: 0 4px 20px rgba(167, 139, 250, 0.15);
        }
        .tab-btn i {
            font-size: 18px;
        }

        .tab-content {
            display: none;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            animation: fadeIn 0.4s ease;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tab-content textarea {
            width: 100%;
            min-height: 140px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 18px;
            color: white;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            outline: none;
            transition: 0.3s;
        }
        .tab-content textarea:focus {
            border-color: #a78bfa;
            background: rgba(167, 139, 250, 0.06);
        }
        .tab-content textarea::placeholder {
            color: #64748b;
        }

        .btn-generate {
            margin-top: 18px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            padding: 16px 36px;
            border-radius: 16px;
            color: #0b0d15;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .btn-generate:hover {
            transform: scale(1.03);
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.3);
        }
        .btn-generate:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .result-box {
            margin-top: 28px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        .result-box img,
        .result-box video,
        .result-box canvas {
            max-width: 100%;
            border-radius: 14px;
            max-height: 520px;
            object-fit: contain;
        }

        .result-box .placeholder {
            color: #64748b;
            font-size: 14px;
            text-align: center;
        }
        .result-box .placeholder i {
            font-size: 32px;
            display: block;
            margin-bottom: 10px;
        }

        .loading {
            display: none;
            color: #a78bfa;
            font-weight: 600;
            gap: 12px;
            align-items: center;
        }
        .loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Video container - seperti reel Instagram */
        .reel-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 9 / 16;
            background: #000;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .reel-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .reel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 20px 20px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            pointer-events: none;
        }

        .reel-overlay .title {
            color: white;
            font-size: 14px;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .reel-overlay .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            margin-top: 4px;
        }

        /* Badge AI */
        .ai-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(167, 139, 250, 0.3);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            color: white;
            border: 1px solid rgba(167, 139, 250, 0.2);
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        .reel-actions {
            position: absolute;
            right: 12px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            pointer-events: none;
        }

        .reel-actions .action-icon {
            color: white;
            font-size: 22px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .reel-actions .action-icon small {
            display: block;
            font-size: 10px;
            font-weight: 600;
            margin-top: 2px;
        }

        @media (max-width: 640px) {
            .logo {
                font-size: 22px;
            }
            .credit-box {
                font-size: 13px;
                padding: 8px 16px;
            }
            .api-section {
                flex-direction: column;
                align-items: stretch;
            }
            .tabs {
                flex-direction: column;
                border-radius: 16px;
            }
            .tab-btn {
                justify-content: center;
            }
            .reel-container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="app">
        <!-- HEADER -->
        <header>
            <div class="logo">ai<span>CHEVER</span></div>
            <div class="credit-box">
                <i class="fas fa-bolt"></i> Kredit Hari Ini: <span id="creditDisplay">5</span>
            </div>
        </header>

        <!-- API KEY SAVER -->
        <div class="api-section">
            <i class="fas fa-key" style="color:#a78bfa;"></i>
            <input type="password" id="apiKeyInput" placeholder="Masukkan API Key (Replicate / OpenAI)" />
            <button class="btn-save" onclick="saveApiKey()">
                <i class="fas fa-save"></i> Simpan
            </button>
            <span class="status-save" id="saveStatus"><i class="fas fa-check-circle"></i> Tersimpan</span>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="tabImage"><i class="fas fa-image"></i> Text → Gambar</button>
            <button class="tab-btn" data-tab="tabVideo"><i class="fas fa-video"></i> Text → Video Reel</button>
        </div>

        <!-- TAB GAMBAR -->
        <div id="tabImage" class="tab-content active">
            <textarea id="promptImage" placeholder="Contoh: 'Cyberpunk city at night, neon lights, 4k, realistic'"></textarea>
            <button class="btn-generate" onclick="generateImage()">
                <i class="fas fa-wand-magic-sparkles"></i> Hasilkan Gambar
            </button>
            <div class="result-box" id="resultImage">
                <div class="placeholder"><i class="fas fa-image"></i> Gambar akan muncul di sini</div>
                <div class="loading" id="loadingImage"><i class="fas fa-spinner"></i> Memproses...</div>
            </div>
        </div>

        <!-- TAB VIDEO REEL -->
        <div id="tabVideo" class="tab-content">
            <textarea id="promptVideo" placeholder="Contoh: 'Seorang model fashion berjalan di jalan kota, cinematic, 4k, slow motion'"></textarea>
            <button class="btn-generate" onclick="generateVideo()">
                <i class="fas fa-wand-magic-sparkles"></i> Hasilkan Video Reel
            </button>
            <div class="result-box" id="resultVideo">
                <div class="placeholder"><i class="fas fa-video"></i> Video reel akan muncul di sini</div>
                <div class="loading" id="loadingVideo"><i class="fas fa-spinner"></i> Memproses...</div>
            </div>
        </div>
    </div>

    <script>
        // ===== KONFIGURASI =====
        const CREDIT_PER_DAY = 5;
        let currentCredit = CREDIT_PER_DAY;
        let apiKey = '';
        let videoInterval = null;

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toDateString();
            const saved = localStorage.getItem('aiChever_credit');
            const savedDate = localStorage.getItem('aiChever_creditDate');

            if (savedDate === today && saved !== null) {
                currentCredit = parseInt(saved);
            } else {
                currentCredit = CREDIT_PER_DAY;
                localStorage.setItem('aiChever_credit', currentCredit);
                localStorage.setItem('aiChever_creditDate', today);
            }
            updateCreditDisplay();

            const savedKey = localStorage.getItem('aiChever_apiKey');
            if (savedKey) {
                document.getElementById('apiKeyInput').value = savedKey;
                apiKey = savedKey;
                document.getElementById('saveStatus').style.display = 'inline';
            }

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    document.getElementById(this.dataset.tab).classList.add('active');
                    // Stop video saat pindah tab
                    if (videoInterval) {
                        clearInterval(videoInterval);
                        videoInterval = null;
                    }
                });
            });
        });

        function updateCreditDisplay() {
            document.getElementById('creditDisplay').textContent = currentCredit;
        }

        function useCredit() {
            if (currentCredit <= 0) {
                alert('⚠️ Kredit habis hari ini! Kembali besok.');
                return false;
            }
            currentCredit--;
            localStorage.setItem('aiChever_credit', currentCredit);
            updateCreditDisplay();
            return true;
        }

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (key.length < 10) {
                alert('Masukkan API Key yang valid (minimal 10 karakter)');
                return;
            }
            apiKey = key;
            localStorage.setItem('aiChever_apiKey', key);
            document.getElementById('saveStatus').style.display = 'inline';
            setTimeout(() => {
                document.getElementById('saveStatus').style.display = 'none';
            }, 3000);
        }

        // ===== GENERATE GAMBAR =====
        async function generateImage() {
            const prompt = document.getElementById('promptImage').value.trim();
            if (!prompt) return alert('Masukkan prompt terlebih dahulu!');
            if (!apiKey) return alert('Simpan API Key terlebih dahulu!');
            if (!useCredit()) return;

            const resultBox = document.getElementById('resultImage');
            const loading = document.getElementById('loadingImage');
            const placeholder = resultBox.querySelector('.placeholder');

            placeholder.style.display = 'none';
            loading.style.display = 'flex';
            resultBox.innerHTML = '';
            resultBox.appendChild(loading);

            try {
                await new Promise(r => setTimeout(r, 1500));
                const img = document.createElement('img');
                img.src = `https://picsum.photos/seed/${Date.now()}/800/450`;
                img.alt = 'Hasil Gambar';
                loading.style.display = 'none';
                resultBox.innerHTML = '';
                resultBox.appendChild(img);
            } catch (error) {
                loading.style.display = 'none';
                resultBox.innerHTML = `<p style="color:#f87171;">❌ Error: ${error.message}</p>`;
            }
        }

        // ===== GENERATE VIDEO REEL (DENGAN GERAKAN VIDEO NYATA) =====
        function generateVideo() {
            const prompt = document.getElementById('promptVideo').value.trim();
            if (!prompt) return alert('Masukkan prompt terlebih dahulu!');
            if (!apiKey) return alert('Simpan API Key terlebih dahulu!');
            if (!useCredit()) return;

            const resultBox = document.getElementById('resultVideo');
            const loading = document.getElementById('loadingVideo');
            const placeholder = resultBox.querySelector('.placeholder');

            // Hentikan video lama jika ada
            if (videoInterval) {
                clearInterval(videoInterval);
                videoInterval = null;
            }

            placeholder.style.display = 'none';
            loading.style.display = 'flex';
            resultBox.innerHTML = '';
            resultBox.appendChild(loading);

            // Simulasi proses render
            setTimeout(() => {
                loading.style.display = 'none';
                resultBox.innerHTML = '';

                // Buat container reel seperti Instagram
                const container = document.createElement('div');
                container.className = 'reel-container';

                // === BUAT VIDEO MENGGUNAKAN CANVAS DENGAN GERAKAN NYATA ===
                const canvas = document.createElement('canvas');
                canvas.width = 360;
                canvas.height = 640;
                canvas.style.width = '100%';
                canvas.style.height = '100%';
                canvas.style.display = 'block';
                const ctx = canvas.getContext('2d');

                container.appendChild(canvas);

                // === ELEMEN OVERLAY ===
                const overlay = document.createElement('div');
                overlay.className = 'reel-overlay';
                overlay.innerHTML = `
                            <div class="title">✨ ${prompt.substring(0, 40)}${prompt.length > 40 ? '...' : ''}</div>
                            <div class="subtitle">AI CHEVER • Generated with AI</div>
                        `;
                container.appendChild(overlay);

                const badge = document.createElement('div');
                badge.className = 'ai-badge';
                badge.textContent = '✦ AI';
                container.appendChild(badge);

                // Action buttons (seperti di reel)
                const actions = document.createElement('div');
                actions.className = 'reel-actions';
                actions.innerHTML = `
                            <div class="action-icon"><i class="fas fa-heart"></i><small>2.3k</small></div>
                            <div class="action-icon"><i class="fas fa-comment"></i><small>128</small></div>
                            <div class="action-icon"><i class="fas fa-share"></i><small>45</small></div>
                        `;
                container.appendChild(actions);

                resultBox.appendChild(container);

                // === ANIMASI VIDEO DENGAN GERAKAN NYATA ===
                // Simpan state untuk animasi
                let frame = 0;
                const particles = [];
                const numParticles = 80;

                // Inisialisasi partikel
                for (let i = 0; i < numParticles; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: Math.random() * 4 + 1,
                        speedX: (Math.random() - 0.5) * 0.8,
                        speedY: (Math.random() - 0.5) * 0.8,
                        opacity: Math.random() * 0.5 + 0.3,
                        color: `hsl(${Math.random() * 60 + 220}, 70%, ${Math.random() * 40 + 40}%)`
                    });
                }

                // Objek bergerak (seperti orang / kendaraan)
                let objects = [];
                for (let i = 0; i < 5; i++) {
                    objects.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height * 0.7 + 100,
                        size: 8 + Math.random() * 15,
                        speed: 0.5 + Math.random() * 1.5,
                        type: Math.floor(Math.random() * 3), // 0:circle,1:rect,2:triangle
                        color: `hsl(${Math.random() * 60 + 180}, 80%, 60%)`,
                        phase: Math.random() * Math.PI * 2
                    });
                }

                // Fungsi render frame
                function renderFrame() {
                    frame++;

                    // === 1. BACKGROUND GRADIENT ===
                    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    const hue1 = 220 + Math.sin(frame * 0.002) * 10;
                    const hue2 = 260 + Math.sin(frame * 0.003 + 1) * 10;
                    grad.addColorStop(0, `hsl(${hue1}, 60%, 15%)`);
                    grad.addColorStop(0.5, `hsl(${hue2}, 50%, 25%)`);
                    grad.addColorStop(1, `hsl(${hue1 + 20}, 40%, 10%)`);
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // === 2. BINTANG BERKEDIP ===
                    particles.forEach(p => {
                        // Gerakan lambat
                        p.x += p.speedX * 0.5;
                        p.y += p.speedY * 0.5;
                        if (p.x < 0) p.x = canvas.width;
                        if (p.x > canvas.width) p.x = 0;
                        if (p.y < 0) p.y = canvas.height;
                        if (p.y > canvas.height) p.y = 0;

                        const twinkle = 0.5 + 0.5 * Math.sin(frame * 0.03 + p.x + p.y);
                        ctx.globalAlpha = p.opacity * twinkle;
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size * (0.8 + 0.2 * twinkle), 0, Math.PI * 2);
                        ctx.fill();
                    });
                    ctx.globalAlpha = 1;

                    // === 3. GARIS-GARIS CINEMATIC (seperti light streak) ===
                    for (let i = 0; i < 3; i++) {
                        const yPos = (canvas.height * 0.2) + i * 200 + Math.sin(frame * 0.01 + i * 2) * 50;
                        ctx.globalAlpha = 0.03;
                        ctx.fillStyle = `hsl(${200 + i * 30}, 80%, 70%)`;
                        ctx.fillRect(0, yPos, canvas.width, 1.5);
                    }
                    ctx.globalAlpha = 1;

                    // === 4. OBJEK BERGERAK (seperti orang / mobil) ===
                    objects.forEach((obj, idx) => {
                        // Gerakan horizontal dengan sedikit vertikal
                        obj.x += obj.speed * 0.8;
                        obj.y += Math.sin(frame * 0.02 + obj.phase) * 0.3;

                        // Wrap around
                        if (obj.x > canvas.width + 30) {
                            obj.x = -30;
                            obj.y = Math.random() * canvas.height * 0.6 + 100;
                            obj.color = `hsl(${Math.random() * 60 + 180}, 80%, 60%)`;
                        }
                        if (obj.x < -30) {
                            obj.x = canvas.width + 30;
                        }

                        // Gambar objek
                        ctx.shadowColor = obj.color;
                        ctx.shadowBlur = 20;
                        ctx.globalAlpha = 0.8;

                        // Efek trail
                        ctx.globalAlpha = 0.15;
                        for (let t = 1; t <= 6; t++) {
                            const trailX = obj.x - t * obj.speed * 3;
                            ctx.fillStyle = obj.color;
                            ctx.beginPath();
                            ctx.arc(trailX, obj.y + Math.sin((frame - t * 2) * 0.02 + obj.phase) * 0.3,
                                obj.size * (1 - t * 0.12), 0, Math.PI * 2);
                            ctx.fill();
                        }

                        ctx.globalAlpha = 0.9;
                        ctx.shadowBlur = 25;
                        ctx.fillStyle = obj.color;

                        // Bentuk berbeda
                        if (obj.type === 0) {
                            // Circle (seperti orang)
                            ctx.beginPath();
                            ctx.arc(obj.x, obj.y, obj.size, 0, Math.PI * 2);
                            ctx.fill();
                            // Kepala
                            ctx.shadowBlur = 10;
                            ctx.fillStyle = `hsl(${40 + idx * 20}, 60%, 70%)`;
                            ctx.beginPath();
                            ctx.arc(obj.x, obj.y - obj.size * 0.7, obj.size * 0.5, 0, Math.PI * 2);
                            ctx.fill();
                            // Kaki bergerak (animasi jalan)
                            const legSwing = Math.sin(frame * 0.08 + idx * 2) * 4;
                            ctx.shadowBlur = 5;
                            ctx.fillStyle = `hsl(${220 + idx * 20}, 40%, 30%)`;
                            ctx.fillRect(obj.x - 4, obj.y + obj.size * 0.2, 3, 10 + legSwing);
                            ctx.fillRect(obj.x + 1, obj.y + obj.size * 0.2, 3, 10 - legSwing);
                        } else if (obj.type === 1) {
                            // Kotak (seperti mobil)
                            ctx.fillRect(obj.x - obj.size, obj.y - obj.size * 0.5, obj.size * 2, obj.size);
                            // Jendela
                            ctx.shadowBlur = 5;
                            ctx.fillStyle = `hsl(${200 + idx * 30}, 80%, 70%)`;
                            ctx.fillRect(obj.x - obj.size * 0.6, obj.y - obj.size * 0.3, obj.size * 0.4, obj.size * 0.5);
                            ctx.fillRect(obj.x + obj.size * 0.2, obj.y - obj.size * 0.3, obj.size * 0.4, obj.size * 0.5);
                        } else {
                            // Segitiga (seperti pesawat/drone)
                            ctx.beginPath();
                            ctx.moveTo(obj.x + obj.size, obj.y);
                            ctx.lineTo(obj.x - obj.size, obj.y - obj.size * 0.7);
                            ctx.lineTo(obj.x - obj.size, obj.y + obj.size * 0.7);
                            ctx.closePath();
                            ctx.fill();
                        }

                        ctx.shadowBlur = 0;
                        ctx.globalAlpha = 1;
                    });

                    // === 5. GARIS HORIZON ===
                    ctx.globalAlpha = 0.1;
                    ctx.strokeStyle = `hsl(${220 + Math.sin(frame * 0.005) * 5}, 80%, 60%)`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(0, canvas.height * 0.7 + Math.sin(frame * 0.01) * 5);
                    ctx.lineTo(canvas.width, canvas.height * 0.7 + Math.sin(frame * 0.01 + 2) * 5);
                    ctx.stroke();

                    // === 6. VIGNETTE ===
                    const vignette = ctx.createRadialGradient(
                        canvas.width / 2, canvas.height / 2, canvas.height * 0.2,
                        canvas.width / 2, canvas.height / 2, canvas.height * 0.9
                    );
                    vignette.addColorStop(0, 'rgba(0,0,0,0)');
                    vignette.addColorStop(1, 'rgba(0,0,0,0.4)');
                    ctx.fillStyle = vignette;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // === 7. TEKS PROMPT DI ATAS ===
                    ctx.globalAlpha = 0.6;
                    ctx.fillStyle = 'white';
                    ctx.font = '10px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`✦ ${prompt.substring(0, 50)}${prompt.length > 50 ? '...' : ''}`, canvas.width / 2, 30);

                    // === 8. WATERMARK ===
                    ctx.globalAlpha = 0.2;
                    ctx.font = '9px Inter, sans-serif';
                    ctx.fillStyle = 'white';
                    ctx.textAlign = 'right';
                    ctx.fillText('AI CHEVER • 2026', canvas.width - 16, canvas.height - 16);

                    ctx.globalAlpha = 1;

                    // Lanjutkan animasi
                    videoInterval = requestAnimationFrame(renderFrame);
                }

                // Mulai animasi
                renderFrame();

            }, 2000);
        }

        // ===== SHORTCUT =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                const activeTab = document.querySelector('.tab-content.active');
                if (activeTab.id === 'tabImage') generateImage();
                else if (activeTab.id === 'tabVideo') generateVideo();
            }
        });
    </script>

</body>
